# Cross-view retrieval — v4
# v2 architecture (ConvNeXt-Base fb_in22k, 224px, batch=64) +
# algorithmic improvements: n_ground=2 (multi-positive), label_smoothing=0.1
#
# Ablation purpose: isolates the effect of loss/smoothing changes from
# backbone and resolution changes.
#   v2 → v4 delta: multi-positive (n_ground 1→2) + label smoothing (0→0.1)
#   v4 → v3 delta: backbone (fb_in22k → fb_in22k_ft_in1k_384) + resolution (224→384px)
#
# At 224px, n_ground=2 with batch=64 uses ~21 GB — fits 32GB V100, AMP not needed.
# Expected result: ~8–10% g2s R@1 (unpooled), between v2 (7.21%) and v3 (8.58%).

data:
  root: "data/MML_Data"

model:
  backbone: "convnext_base.fb_in22k"   # same as v2 — IN-22k only, no ft_in1k
  embed_dim: 0                          # native 1024

training:
  epochs: 36
  batch_size: 64
  img_size: 224
  n_ground: 2                           # multi-positive; 2 ground imgs per satellite per step
  lr: 0.0001
  weight_decay: 0.0001
  temperature: 0.07
  learnable_temp: true
  label_smoothing: 0.1                  # softens over-confident predictions
  warmup_epochs: 3
  warmup_start_factor: 0.1
  min_lr_ratio: 0.01
  num_workers: 6
  prefetch_factor: 4
  persistent_workers: true
  eval_every: 9                         # 4 evals: ep 9, 18, 27, 36
  eval_batch_size: 384

evaluation:
  recall_ks: [1, 5, 10]
  map_k: 1000
  directions: ["g2s", "s2g"]
  include_index: true
  pool_queries: false                   # unpooled = paper-comparable (same as v3)

hard_negatives:
  enabled: true
  neighbor_pool: 64
  pool_size: 32
  iters_per_epoch: null
  gps_epochs: 4
  dss_refresh_every: 1
  dss_embed_batch: 128

device: "cuda"
save_dir: "checkpoints/crossview"

logging:
  runs_root: "checkpoints/crossview"
  run_prefix: "cv_v4_base_"
  run_tag: null
  selection_metric: "g2s_recall@1"
