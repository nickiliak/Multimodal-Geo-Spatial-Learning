# GeoClip zero-shot baseline configuration

data:
  root: "data/MML_Data"

gallery:
  source: paper      # "train" (17k) | "index" (100k, honest in-the-wild) | "paper" (101k, index+query, reproduces paper's 21.37%) | "both" (118k)

inference:
  batch_size: 64
  device: "cuda"

evaluation:
  thresholds_km: [1, 25, 200, 750, 2500]
